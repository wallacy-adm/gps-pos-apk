name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393'

      - name: Instalar dependencias npm
        run: npm ci

      - name: Expo Prebuild (gera pasta android/)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Configurar build.gradle (ARM filter + signing + release standalone)
        run: |
          python3 << 'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # 1. Filtrar apenas ARM (exclui x86 — nunca usado em POS reais)
          if 'abiFilters' not in content:
              content = re.sub(
                  r'(defaultConfig \{)',
                  '\\1\n        ndk {\n            abiFilters "arm64-v8a", "armeabi-v7a"\n        }',
                  content,
                  count=1
              )
              print("ABI filter ARM64+ARM32 adicionado")
          else:
              print("ABI filter ja existia")

          # 2. Adicionar signingConfigs antes de buildTypes
          signing_block = '''
      signingConfigs {
          standalone {
              storeFile file("standalone.keystore")
              storePassword "standalone"
              keyAlias "standalone"
              keyPassword "standalone"
          }
      }
  '''
          if 'signingConfigs' not in content:
              content = re.sub(
                  r'(\s+buildTypes\s*\{)',
                  signing_block + r'\1',
                  content,
                  count=1
              )
              print("signingConfigs adicionado")

          # 3. Configurar release build: assinar + sem ProGuard + sem shrinkResources
          #    Substitui o bloco release { ... } para garantir configuracao correta
          release_config = '''release {
              signingConfig signingConfigs.standalone
              minifyEnabled false
              shrinkResources false'''
          content = re.sub(
              r'release\s*\{',
              release_config,
              content,
              count=1
          )
          print("Release build configurado: signing + minifyEnabled false")

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          EOF

      - name: Gerar keystore de assinatura (standalone — instalacao direta sem Play Store)
        run: |
          keytool -genkeypair \
            -keystore android/app/standalone.keystore \
            -alias standalone \
            -keyalg RSA -keysize 2048 -validity 9000 \
            -dname "CN=Standalone,O=POS,C=BR" \
            -storepass standalone -keypass standalone
          echo "Keystore gerado com sucesso"

      - name: Build APK Release (JS embutido — funciona sem Metro/internet)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gps-pos-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Mostrar info do APK
        run: |
          ls -lh android/app/build/outputs/apk/release/
          echo "APK release gerado! JS embutido — funciona standalone no POS."
          echo "Download em Actions > Artifacts > gps-pos-apk-${{ github.run_number }}"
