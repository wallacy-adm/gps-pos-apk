name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393'

      - name: Instalar dependencias npm
        run: npm ci

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Gerar keystore de assinatura
        run: |
          keytool -genkeypair \
            -keystore android/app/standalone.keystore \
            -alias standalone \
            -keyalg RSA -keysize 2048 -validity 9000 \
            -dname "CN=Standalone,O=POS,C=BR" \
            -storepass standalone -keypass standalone
          echo "Keystore criado"

      - name: Configurar build.gradle
        run: python3 .github/scripts/configure_gradle.py

      - name: Build APK Release
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gps-pos-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Info do APK
        run: |
          ls -lh android/app/build/outputs/apk/release/
          echo "APK release OK - JS embutido, funciona standalone no POS"
