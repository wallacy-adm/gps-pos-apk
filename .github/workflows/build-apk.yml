name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.1.8937393'

      - name: Instalar dependencias npm
        run: npm ci

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Gerar keystore de assinatura
        run: |
          keytool -genkeypair \
            -keystore android/app/standalone.keystore \
            -alias standalone \
            -keyalg RSA -keysize 2048 -validity 9000 \
            -dname "CN=Standalone,O=POS,C=BR" \
            -storepass standalone -keypass standalone
          echo "Keystore criado"

      - name: Configurar build.gradle
        run: python3 .github/scripts/configure_gradle.py

      - name: Build APK Release
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Extrair versao do app.json
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          VERSION_CODE=$(node -p "require('./app.json').expo.android.versionCode")
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "apk_name=gps-pos-v$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Renomear APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             ${{ steps.version.outputs.apk_name }}

      - name: Criar GitHub Release e publicar APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "GPS POS Tracker ${{ steps.version.outputs.tag }}"
          body: "Build automatico — vCode ${{ steps.version.outputs.code }}"
          files: ${{ steps.version.outputs.apk_name }}
          make_latest: true

      - name: Atualizar latest.json
        run: |
          cat > latest.json << EOF
          {
            "version_code": ${{ steps.version.outputs.code }},
            "version_name": "${{ steps.version.outputs.name }}",
            "apk_url": "https://github.com/wallacy-adm/gps-pos-apk/releases/download/${{ steps.version.outputs.tag }}/${{ steps.version.outputs.apk_name }}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --staged --quiet || git commit -m "chore: atualiza latest.json para ${{ steps.version.outputs.tag }}"
          git push

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: gps-pos-apk-${{ github.run_number }}
          path: ${{ steps.version.outputs.apk_name }}
          retention-days: 30

      - name: Info do APK
        run: |
          ls -lh ${{ steps.version.outputs.apk_name }}
          echo "Release criada: ${{ steps.version.outputs.tag }}"
